name: Build Release Appliances (VM + LXC)

on:
  # TEST: läuft automatisch bei jedem Push in testing. Nach dem Entwickeln entfernen.
  push:
    branches: [testing]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release-Tag (z. B. v0.9.11), nur für manuelle Läufe"
        required: false
        default: ""

permissions:
  contents: write

env:
  PVE_PORT: "5000"
  DEBIAN_RELEASE: "trixie"
  APT_POLL_RETRIES: "40"     # 40 x 30s = max. 20 Minuten
  APT_POLL_INTERVAL: "30"

jobs:
  # ----------------------------------------------------------------------
  # 1) Version ermitteln + warten bis Paket im gyptazy-Repo verfügbar ist
  # ----------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      aptver:  ${{ steps.poll.outputs.aptver }}
    steps:
      - id: ver
        run: |
          # TEST: feste Version, die garantiert schon im gyptazy-Repo liegt.
          # Zum Live-Betrieb diesen TEST-Block löschen und den darunter aktivieren.
          echo "version=v0.9.10" >> "$GITHUB_OUTPUT"

          # --- Live-Logik (auskommentiert, bis Testing fertig) ---
          # if [ -n "${{ github.event.release.tag_name }}" ]; then
          #   V="${{ github.event.release.tag_name }}"
          # elif [ -n "${{ inputs.tag }}" ]; then
          #   V="${{ inputs.tag }}"
          # else
          #   V="dev-$(date +%Y%m%d-%H%M%S)"
          # fi
          # echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg ca-certificates

      - id: poll
        name: Auf PegaProx-Paket im APT-Repo warten
        run: |
          set -e
          # Key + Sources-Liste lokal im Workspace ablegen (kein /etc, kein sudo nötig)
          curl -fsSL https://git.gyptazy.com/api/packages/gyptazy/debian/repository.key \
            -o gyptazy.asc
          mkdir -p apt-root/etc/apt/sources.list.d \
                   apt-root/etc/apt/keyrings \
                   apt-root/var/lib/apt/lists/partial \
                   apt-root/var/cache/apt/archives/partial
          cp gyptazy.asc apt-root/etc/apt/keyrings/gyptazy.asc
          echo "deb [signed-by=$(pwd)/apt-root/etc/apt/keyrings/gyptazy.asc] https://packages.gyptazy.com/api/packages/gyptazy/debian ${DEBIAN_RELEASE} main" \
            > apt-root/etc/apt/sources.list.d/gyptazy.list

          WANT="$(echo '${{ steps.ver.outputs.version }}' | sed 's/^v//')"
          echo "Erwarte Paketversion (Präfix): $WANT"

          # apt komplett auf das lokale Verzeichnis umbiegen -> keine Root-Rechte nötig
          APT_OPTS="-o Dir::Etc::sourcelist=$(pwd)/apt-root/etc/apt/sources.list.d/gyptazy.list \
                    -o Dir::Etc::sourceparts=- \
                    -o Dir::Etc::trusted=$(pwd)/apt-root/etc/apt/keyrings/gyptazy.asc \
                    -o Dir::State::lists=$(pwd)/apt-root/var/lib/apt/lists \
                    -o Dir::Cache=$(pwd)/apt-root/var/cache/apt"

          FOUND=""
          for i in $(seq 1 "${APT_POLL_RETRIES}"); do
            apt-get $APT_OPTS update >/dev/null 2>&1 || true
            CAND="$(apt-cache $APT_OPTS madison pegaprox 2>/dev/null | awk '{print $3}' || true)"
            MATCH="$(echo "$CAND" | grep -E "^${WANT}([.+~-]|$)" | head -n1 || true)"
            if [ -n "$MATCH" ]; then
              FOUND="$MATCH"
              echo "Gefunden: pegaprox=$FOUND"
              break
            fi
            echo "[$i/${APT_POLL_RETRIES}] Paket $WANT noch nicht im Repo, warte ${APT_POLL_INTERVAL}s..."
            sleep "${APT_POLL_INTERVAL}"
          done

          if [ -z "$FOUND" ]; then
            echo "::error::Paket für $WANT ist nach dem Timeout nicht im gyptazy-Repo aufgetaucht."
            exit 1
          fi
          echo "aptver=$FOUND" >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------------------
  # 2) LXC-Template per distrobuilder (Snap) + Smoke-Test
  # ----------------------------------------------------------------------
  build-lxc:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tools installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap rsync systemd-container curl xz-utils
          # distrobuilder liegt NICHT in apt -> per Snap installieren
          sudo snap install distrobuilder --classic
          export PATH="$PATH:/snap/bin"
          distrobuilder --version

      - name: distrobuilder-Definition schreiben
        env:
          APTVER: ${{ needs.prepare.outputs.aptver }}
        run: |
          mkdir -p packaging/lxc
          cat > packaging/lxc/pegaprox-lxc.yaml <<YAML
          image:
            distribution: debian
            release: ${DEBIAN_RELEASE}
            description: PegaProx LXC Appliance (${APTVER})
            architecture: amd64

          source:
            downloader: debootstrap
            url: http://deb.debian.org/debian
            keyserver: keyserver.ubuntu.com

          targets:
            lxc:
              create_message: |
                PegaProx Appliance - Login: pegaprox / admin
              config:
                - type: all
                  before: 5
                  content: |-
                    lxc.include = LXC_TEMPLATE_CONFIG/common.conf
                - type: all
                  after: 4
                  content: |-
                    lxc.include = LXC_TEMPLATE_CONFIG/userns.conf
                - type: all
                  content: |-
                    lxc.arch = x86_64

          packages:
            manager: apt
            update: true
            cleanup: true
            sets:
              - packages:
                  - python3
                  - python3-pip
                  - curl
                  - ca-certificates
                  - gnupg
                  - systemd
                  - systemd-sysv
                action: install

          actions:
            - trigger: post-packages
              action: |-
                #!/bin/sh
                set -eu
                install -d -m 0755 /etc/apt/keyrings
                curl -fsSL https://git.gyptazy.com/api/packages/gyptazy/debian/repository.key \\
                  -o /etc/apt/keyrings/gyptazy.asc
                echo "deb [signed-by=/etc/apt/keyrings/gyptazy.asc] https://packages.gyptazy.com/api/packages/gyptazy/debian ${DEBIAN_RELEASE} main" \\
                  > /etc/apt/sources.list.d/gyptazy.list
                apt-get update
                apt-get -y install "pegaprox=${APTVER}"
                systemctl enable pegaprox || true

          mappings:
            architecture_map: debian
          YAML

      - name: rootfs bauen
        run: |
          export PATH="$PATH:/snap/bin"
          sudo --preserve-env=PATH "$(command -v distrobuilder)" \
            build-lxc packaging/lxc/pegaprox-lxc.yaml \
            -o image.release=${DEBIAN_RELEASE}
          ls -lh *.tar.xz

      - name: Smoke-Test (Container starten + HTTP-Check)
        run: |
          set -e
          mkdir -p /tmp/ct/rootfs
          sudo tar -xpJf rootfs.tar.xz -C /tmp/ct/rootfs

          # Container im Hintergrund booten. Ohne --network-veth teilt er sich
          # das Host-Netzwerk -> PegaProx lauscht auf localhost:5000 des Runners.
          sudo systemd-nspawn -D /tmp/ct/rootfs \
            --machine pegaprox-test \
            --boot \
            --bind-ro=/etc/resolv.conf \
            > /tmp/nspawn.log 2>&1 &

          echo "Warte auf PegaProx auf Port ${PVE_PORT}..."
          OK=0
          for i in $(seq 1 36); do
            # erst HTTPS, dann HTTP probieren (je nachdem, was PegaProx spricht)
            if curl -kfs "https://localhost:${PVE_PORT}/" >/dev/null 2>&1 \
               || curl -fs "http://localhost:${PVE_PORT}/" >/dev/null 2>&1; then
              OK=1; break
            fi
            sleep 5
          done

          echo "----- Letzte Zeilen des Container-Logs -----"
          tail -n 40 /tmp/nspawn.log || true
          echo "----- Lauschende Ports auf dem Host -----"
          sudo ss -tlnp || true

          # Container sauber herunterfahren
          sudo machinectl poweroff pegaprox-test 2>/dev/null || true
          sleep 3
          sudo machinectl terminate pegaprox-test 2>/dev/null || true

          [ "$OK" -eq 1 ] || { echo "::error::PegaProx kam im LXC nicht hoch"; exit 1; }
          echo "LXC Smoke-Test erfolgreich."

      - name: Template umbenennen
        run: |
          mv rootfs.tar.xz \
            "pegaprox-${{ needs.prepare.outputs.version }}-lxc-amd64.tar.xz"
          cp "pegaprox-${{ needs.prepare.outputs.version }}-lxc-amd64.tar.xz" \
             "pegaprox-lxc-amd64.tar.xz"

      - name: Artefakt sichern
        uses: actions/upload-artifact@v4
        with:
          name: lxc-template
          path: pegaprox-*lxc*.tar.xz
          retention-days: 7

  # ----------------------------------------------------------------------
  # 3) VM-Image: Dateien per qemu-nbd direkt einhängen (kein libguestfs,
  #    kein passt). PegaProx wird beim ERSTEN BOOT per systemd-Unit installiert.
  # ----------------------------------------------------------------------
  build-vm:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tools installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-utils qemu-system-x86 cloud-image-utils curl

      - name: Debian Cloud-Image laden
        run: |
          wget -q -O pegaprox.qcow2 \
            "https://cloud.debian.org/images/cloud/${DEBIAN_RELEASE}/latest/debian-13-genericcloud-amd64.qcow2"
          qemu-img resize pegaprox.qcow2 8G

      - name: Dateien per qemu-nbd einhängen (kein libguestfs, kein passt)
        env:
          APTVER: ${{ needs.prepare.outputs.aptver }}
        run: |
          set -e

          # --- Dateien, die ins Image sollen, auf dem Runner vorbereiten ---
          curl -fsSL https://git.gyptazy.com/api/packages/gyptazy/debian/repository.key \
            -o gyptazy.asc

          cat > gyptazy.list <<EOF
          deb [signed-by=/etc/apt/keyrings/gyptazy.asc] https://packages.gyptazy.com/api/packages/gyptazy/debian ${DEBIAN_RELEASE} main
          EOF

          cat > install-pegaprox.sh <<EOF
          #!/bin/sh
          set -eu
          apt-get update
          apt-get -y install pegaprox=${APTVER}
          systemctl enable pegaprox
          systemctl disable pegaprox-firstboot.service || true
          EOF

          cat > pegaprox-firstboot.service <<'EOF'
          [Unit]
          Description=PegaProx First Boot Installer
          After=network-online.target
          Wants=network-online.target
          ConditionPathExists=/usr/local/sbin/install-pegaprox.sh

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/install-pegaprox.sh
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
          EOF

          # --- qcow2 als NBD-Blockgerät einhängen ---
          sudo modprobe nbd max_part=16
          sudo qemu-nbd --connect=/dev/nbd0 pegaprox.qcow2
          # auf Partitionstabelle warten
          for i in $(seq 1 10); do
            sudo partprobe /dev/nbd0 2>/dev/null || true
            sleep 1
            ls /dev/nbd0p* >/dev/null 2>&1 && break
          done
          echo "Partitionen:"; lsblk /dev/nbd0

          # --- Root-Partition finden (die mit /etc/os-release) ---
          ROOT=""
          for PART in $(ls /dev/nbd0p* 2>/dev/null); do
            sudo mkdir -p /mnt/probe
            if sudo mount "$PART" /mnt/probe 2>/dev/null; then
              if [ -f /mnt/probe/etc/os-release ]; then
                ROOT="$PART"
                sudo umount /mnt/probe
                break
              fi
              sudo umount /mnt/probe
            fi
          done
          [ -n "$ROOT" ] || { echo "::error::Root-Partition nicht gefunden"; exit 1; }
          echo "Root-Partition: $ROOT"

          sudo mkdir -p /mnt/img
          sudo mount "$ROOT" /mnt/img

          # --- Dateien hineinkopieren ---
          sudo mkdir -p /mnt/img/etc/apt/keyrings
          sudo cp gyptazy.asc  /mnt/img/etc/apt/keyrings/gyptazy.asc
          sudo cp gyptazy.list /mnt/img/etc/apt/sources.list.d/gyptazy.list
          sudo cp install-pegaprox.sh /mnt/img/usr/local/sbin/install-pegaprox.sh
          sudo chmod 0755 /mnt/img/usr/local/sbin/install-pegaprox.sh
          sudo cp pegaprox-firstboot.service \
            /mnt/img/etc/systemd/system/pegaprox-firstboot.service

          # --- Services aktivieren = Symlinks setzen (kein chroot/systemctl nötig) ---
          sudo mkdir -p /mnt/img/etc/systemd/system/multi-user.target.wants
          sudo ln -sf /etc/systemd/system/pegaprox-firstboot.service \
            /mnt/img/etc/systemd/system/multi-user.target.wants/pegaprox-firstboot.service

          # ssh aktivieren, falls Unit vorhanden (Pfad kann ssh.service oder sshd.service sein)
          for U in ssh.service sshd.service; do
            if [ -f "/mnt/img/lib/systemd/system/$U" ] || [ -f "/mnt/img/usr/lib/systemd/system/$U" ]; then
              SRC="/lib/systemd/system/$U"
              [ -f "/mnt/img/usr/lib/systemd/system/$U" ] && SRC="/usr/lib/systemd/system/$U"
              sudo ln -sf "$SRC" \
                "/mnt/img/etc/systemd/system/multi-user.target.wants/$U"
              break
            fi
          done

          sudo sync

          # --- sauber aushängen ---
          sudo umount /mnt/img
          sudo qemu-nbd --disconnect /dev/nbd0
          echo "Image-Bearbeitung abgeschlossen."

      - name: Smoke-Test (VM booten + First-Boot-Install + HTTP-Check)
        run: |
          set -e
          cat > user-data <<'EOF'
          #cloud-config
          password: pegaprox
          chpasswd: { expire: false }
          ssh_pwauth: true
          EOF
          echo "instance-id: iid-pegaprox" > meta-data
          cloud-localds seed.iso user-data meta-data

          qemu-system-x86_64 \
            -m 2048 -smp 2 \
            -drive file=pegaprox.qcow2,format=qcow2,if=virtio \
            -drive file=seed.iso,format=raw,if=virtio \
            -netdev user,id=n0,hostfwd=tcp::${PVE_PORT}-:${PVE_PORT} \
            -device virtio-net-pci,netdev=n0 \
            -display none -daemonize -pidfile qemu.pid

          echo "Warte auf PegaProx in der VM (First-Boot-Install, max. 8 min)..."
          OK=0
          for i in $(seq 1 96); do
            if curl -kfs "https://localhost:${PVE_PORT}/" >/dev/null 2>&1 \
               || curl -fs "http://localhost:${PVE_PORT}/" >/dev/null 2>&1; then
              OK=1; break
            fi
            sleep 5
          done
          sudo kill "$(cat qemu.pid)" 2>/dev/null || true
          [ "$OK" -eq 1 ] || { echo "::error::PegaProx kam in der VM nicht hoch"; exit 1; }
          echo "VM Smoke-Test erfolgreich."

      - name: Image komprimieren + umbenennen
        run: |
          qemu-img convert -O qcow2 -c pegaprox.qcow2 \
            "pegaprox-${{ needs.prepare.outputs.version }}-vm-amd64.qcow2"
          cp "pegaprox-${{ needs.prepare.outputs.version }}-vm-amd64.qcow2" \
             "pegaprox-vm-amd64.qcow2"

      - name: Artefakt sichern
        uses: actions/upload-artifact@v4
        with:
          name: vm-image
          path: pegaprox-*vm*.qcow2
          retention-days: 7

  # ----------------------------------------------------------------------
  # 4) OPTIONAL: Echtes vzdump-Backup auf self-hosted Proxmox-Node
  #    Läuft nur, wenn ein Runner mit Labels [self-hosted, proxmox] da ist.
  # ----------------------------------------------------------------------
  build-vzdump:
    needs: [prepare, build-vm]
    runs-on: [self-hosted, proxmox]
    continue-on-error: true
    steps:
      - name: VM-qcow2 holen
        uses: actions/download-artifact@v4
        with:
          name: vm-image
          path: .

      - name: VM importieren, testen und als vzdump exportieren
        env:
          VMID: "9000"
          STORAGE: "local-lvm"
          DUMP_STORAGE: "local"
        run: |
          set -e
          QCOW="$(ls pegaprox-*-vm-amd64.qcow2 | head -n1)"
          VER="${{ needs.prepare.outputs.version }}"

          qm stop "$VMID" 2>/dev/null || true
          qm destroy "$VMID" --purge 2>/dev/null || true

          qm create "$VMID" --name "pegaprox-build-$VER" \
            --memory 2048 --cores 2 --net0 virtio,bridge=vmbr0 \
            --scsihw virtio-scsi-single --ostype l26 --agent 1
          qm importdisk "$VMID" "$QCOW" "$STORAGE"
          qm set "$VMID" --scsi0 "${STORAGE}:vm-${VMID}-disk-0"
          qm set "$VMID" --boot order=scsi0
          qm set "$VMID" --ciuser pegaprox --cipassword pegaprox --ipconfig0 ip=dhcp
          qm set "$VMID" --ide2 "${STORAGE}:cloudinit"

          qm start "$VMID"
          echo "Warte auf Guest-Agent / Boot..."
          OK=0
          for i in $(seq 1 60); do
            if qm guest cmd "$VMID" ping >/dev/null 2>&1; then OK=1; break; fi
            sleep 5
          done
          [ "$OK" -eq 1 ] || { echo "::error::vzdump-VM bootete nicht"; qm stop "$VMID" || true; exit 1; }

          qm shutdown "$VMID" --timeout 120 || qm stop "$VMID"
          vzdump "$VMID" --storage "$DUMP_STORAGE" --mode stop --compress zstd

          DUMP_DIR="/var/lib/vz/dump"
          LATEST="$(ls -t ${DUMP_DIR}/vzdump-qemu-${VMID}-*.vma.zst | head -n1)"
          cp "$LATEST" "pegaprox-${VER}-vzdump.vma.zst"

          qm destroy "$VMID" --purge

      - name: vzdump sichern
        uses: actions/upload-artifact@v4
        with:
          name: vzdump-backup
          path: pegaprox-*-vzdump.vma.zst
          retention-days: 7

  # ----------------------------------------------------------------------
  # 5) Alles an den Release anhängen (nur bei echtem Release-Event)
  # ----------------------------------------------------------------------
  publish:
    needs: [prepare, build-lxc, build-vm, build-vzdump]
    if: ${{ always() && github.event_name == 'release' && needs.build-lxc.result == 'success' && needs.build-vm.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Checksums erzeugen
        run: |
          cd dist
          find . -type f \( -name '*.qcow2' -o -name '*.tar.xz' -o -name '*.vma.zst' \) \
            -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: An Release anhängen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          files: |
            dist/**/*.qcow2
            dist/**/*.tar.xz
            dist/**/*.vma.zst
            dist/SHA256SUMS.txt
